networks:
  vchat_network:
    driver: bridge

services:
  web:
    build: .
    container_name: webrtc_chat
    ports:
      - "8080:8080"
    depends_on:
      - coturn
    restart: unless-stopped
    networks:
      - vchat_network

  coturn:
    image: coturn/coturn
    container_name: coturn_server
    restart: unless-stopped
    command:
      - "--log-file=stdout"
      - "--external-ip=87.251.87.161"   # <- укажите ваш публичный IP или удалите эту строку
      - "--listening-port=3478"
      - "--realm=87.251.87.161"
      - "--lt-cred-mech"
      - "--user=roman:1234"
      - "--no-cli"
      - "--no-tls"
      - "--no-dtls"
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
    networks:
      - vchat_network

  nginx:
    image: nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./public:/var/www/html
      - ./docker/certbot/www:/var/www/certbot
      - ./docker/certbot/conf/:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    networks:
      - vchat_network

  certbot:
    image: certbot/certbot
    volumes:
      - ./docker/certbot/www/:/var/www/certbot/
      - ./docker/certbot/conf/:/etc/letsencrypt/
