<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>WebRTC Video Chat</title>
    <style>
      body { display: flex; flex-direction: column; align-items: center; background: #f5f5f5; font-family: sans-serif; }
      video { width: 45%; margin: 10px; border-radius: 12px; background: black; }
      #videos { display: flex; justify-content: center; flex-wrap: wrap; }
      button { margin: 10px; padding: 10px 20px; }
    </style>
</head>
<body>
<h2>Simple WebRTC Video Chat (with WebSocket signaling)</h2>
<div id="videos">
    <video id="localVideo" autoplay playsinline muted></video>
    <video id="remoteVideo" autoplay playsinline></video>
</div>
<div>
    <button id="startBtn">Start</button>
    <button id="callBtn">Call</button>
</div>

<script>
  const ws = new WebSocket("ws://" + window.location.host + "/ws");
  const servers = {
    iceServers: [
      { urls: "stun:localhost:3478" },
      { urls: "turn:localhost:3478", username: "roman", credential: "1234" },
    ]
  };

  let localStream, pc, isCaller = false;

  ws.onmessage = async (event) => {
    const msg = JSON.parse(event.data);

    if (msg.type === "offer") {
      await createPeerConnection();
      await pc.setRemoteDescription(new RTCSessionDescription(msg.offer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      ws.send(JSON.stringify({ type: "answer", answer }));
    } else if (msg.type === "answer" && pc) {
      await pc.setRemoteDescription(new RTCSessionDescription(msg.answer));
    } else if (msg.type === "candidate" && pc) {
      await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
    }
  };

  async function start() {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    document.getElementById('localVideo').srcObject = localStream;
  }

  async function createPeerConnection() {
    pc = new RTCPeerConnection(servers);

    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    pc.ontrack = e => {
      document.getElementById('remoteVideo').srcObject = e.streams[0];
    };

    pc.onicecandidate = e => {
      if (e.candidate) {
        ws.send(JSON.stringify({ type: "candidate", candidate: e.candidate }));
      }
    };
  }

  async function call() {
    await createPeerConnection();
    isCaller = true;
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    ws.send(JSON.stringify({ type: "offer", offer }));
  }

  document.getElementById('startBtn').onclick = start;
  document.getElementById('callBtn').onclick = call;
</script>
</body>
</html>
